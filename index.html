<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #sheet-container { height: calc(100vh - 160px); width: 100%; overflow: hidden; background: white; }
        .footer { padding: 10px; background: white; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 8px; }
        .btn { border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-add { background: #e4e6eb; color: #050505; }
        
        /* Loading Overlay */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .progress-container { width: 70%; background: #eee; border-radius: 10px; height: 12px; margin: 15px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="loadingText">Processing IDs...</div>
    <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
    <div id="statusText" style="font-size:12px">0 of 0</div>
    <div id="finalMsg" style="font-weight:bold; color:#2ecc71; margin-top:10px"></div>
</div>

<div class="header">
    <div style="font-weight:bold; font-size:18px">ID SUBMIT PANEL</div>
    <div style="font-size:11px">Minimum 10 IDs Required</div>
</div>

<div id="sheet-container"></div>

<div class="footer">
    <button class="btn btn-add" id="addRowBtn">+ Add 20 More Rows</button>
    <button class="btn btn-submit" id="submitBtn">SUBMIT ALL ID</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const container = document.querySelector('#sheet-container');
    
    // শুরুতেই ৫০টি খালি রো দিয়ে শিট তৈরি
    const initialData = Array.from({ length: 50 }, () => ["", "", ""]);

    const hot = new Handsontable(container, {
        data: initialData,
        colHeaders: ['UID', 'PASSWORD', '2FA KEY'],
        rowHeaders: true,
        height: '100%',
        width: '100%',
        stretchH: 'all',
        colWidths: [120, 100, 150],
        manualColumnResize: true,
        contextMenu: true,
        licenseKey: 'non-commercial-and-evaluation',
        copyPaste: true, // কপি-পেস্ট এনাবেল করা হলো
        cells(row, col) {
            const cellProperties = {};
            cellProperties.className = 'htCenter htMiddle';
            return cellProperties;
        }
    });

    // ২০ টি রো বাড়ানোর লজিক
    document.getElementById('addRowBtn').addEventListener('click', () => {
        hot.alter('insert_row_below', hot.countRows(), 20);
    });

    // সাবমিট লজিক
    document.getElementById('submitBtn').addEventListener('click', () => {
        const fullData = hot.getData();
        let submissionList = [];

        fullData.forEach(row => {
            if (row[0] && row[0].toString().trim() !== "") {
                submissionList.push({
                    u: row[0].toString().trim(),
                    p: (row[1] || "").toString().trim(),
                    t: (row[2] || "").toString().trim()
                });
            }
        });

        if (submissionList.length < 10) {
            alert("কমপক্ষে ১০ টি আইডি দিন। আপনি দিয়েছেন: " + submissionList.length);
            return;
        }

        // ডুপ্লিকেট রিমুভ (UID এর ওপর ভিত্তি করে)
        const uniqueData = submissionList.filter((v, i, a) => a.findIndex(t => t.u === v.u) === i);

        // সাবমিশন প্রসেস শুরু
        document.getElementById('overlay').style.display = 'flex';
        
        let i = 0;
        const total = uniqueData.length;
        const interval = setInterval(() => {
            if (i >= total) {
                clearInterval(interval);
                document.getElementById('finalMsg').innerText = "✔ ID Submit Successful";
                
                // Bots.Business এ ডাটা পাঠানো
                tg.sendData(JSON.stringify(uniqueData));
                
                setTimeout(() => { location.reload(); }, 2500);
                return;
            }
            i++;
            document.getElementById('pb').style.width = (i/total)*100 + "%";
            document.getElementById('statusText').innerText = "Sending " + i + " of " + total;
        }, 80);
    });
</script>

</body>
</html>
