<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Submit Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #1877f2; --success: #2ecc71; --bg: #f4f4f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 5px; }
        .header { background: var(--primary); color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 8px; }
        .container { background: white; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f0f2f5; padding: 6px 2px; border: 1px solid #ddd; font-size: 11px; color: #555; }
        td { border: 1px solid #ddd; padding: 0; }
        input { width: 100%; border: none; padding: 8px 3px; outline: none; font-size: 12px; text-align: center; box-sizing: border-box; background: transparent; }
        input:focus { background: #f0f7ff; }
        .controls { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .btn { border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-add { background: #ebedf0; color: #444; }
        .btn-submit { background: var(--primary); color: white; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .progress-container { width: 70%; background: #eee; border-radius: 10px; height: 12px; margin: 15px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); }
    </style>
</head>
<body>

<div id="overlay">
    <div id="loadingText" style="font-size:14px">Processing...</div>
    <div class="progress-container"><div class="progress-bar" id="pb"></div></div>
    <div id="statusText" style="font-size:12px">0 of 0</div>
    <div id="check" style="font-size:40px; display:none; color:var(--success)">✔</div>
    <div id="finalMsg" style="font-size:14px; font-weight:bold; margin-top:5px;"></div>
</div>

<div class="header">
    <div style="font-weight:bold; font-size:16px">ID SUBMISSION PANEL</div>
    <div style="font-size:10px">Minimum 10 IDs</div>
</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th style="width: 12%;">SL</th>
                <th>UID</th>
                <th>Pass</th>
                <th>2FA</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    
    <div class="controls">
        <button class="btn btn-add" onclick="addRows(20)">+ 20 Rows</button>
        <button class="btn btn-submit" onclick="startSubmit()">SUBMIT ALL ID</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let rowCount = 0;

    function addRows(count) {
        const body = document.getElementById('tableBody');
        for (let i = 0; i < count; i++) {
            rowCount++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center; background:#fafafa; font-size:10px; color:#888;">${rowCount}</td>
                <td><input type="text" class="uid-in" placeholder="UID"></td>
                <td><input type="text" class="pass-in" placeholder="Pass"></td>
                <td><input type="text" class="twofa-in" placeholder="2FA"></td>
            `;
            body.appendChild(tr);
        }
        setupPasteListeners();
    }

    function setupPasteListeners() {
        document.querySelectorAll('.uid-in').forEach(input => {
            input.onpaste = function(e) {
                e.preventDefault();
                let text = (e.clipboardData || window.clipboardData).getData('text');
                let rows = text.split(/\r?\n/);
                let currentRow = this.closest('tr');

                rows.forEach(row => {
                    if (!currentRow || row.trim() === "") return;
                    
                    // ট্যাব, পাইপ, কোলন অথবা ২ বা তার বেশি স্পেস দিয়ে ডাটা স্লিট করা
                    let columns = row.split(/\t+|\||:|\s{2,}/).map(c => c.trim()).filter(c => c !== "");
                    
                    let inputs = currentRow.querySelectorAll('input');
                    if (columns[0]) inputs[0].value = columns[0];
                    if (columns[1]) inputs[1].value = columns[1];
                    if (columns[2]) inputs[2].value = columns[2];

                    currentRow = currentRow.nextElementSibling;
                });
            };
        });
    }

    function startSubmit() {
        const uids = document.querySelectorAll('.uid-in');
        const passes = document.querySelectorAll('.pass-in');
        const twofas = document.querySelectorAll('.twofa-in');
        let dataList = [];
        
        for (let i = 0; i < uids.length; i++) {
            let u = uids[i].value.trim();
            if (u !== "") {
                dataList.push({ u: u, p: passes[i].value.trim(), t: twofas[i].value.trim() });
            }
        }

        if (dataList.length < 10) {
            alert("Minimum 10 IDs! Current: " + dataList.length);
            return;
        }

        const uniqueData = dataList.filter((v, i, a) => a.findIndex(t => t.u === v.u) === i);
        document.getElementById('overlay').style.display = 'flex';
        
        let i = 0;
        const total = uniqueData.length;
        const interval = setInterval(() => {
            if (i >= total) {
                clearInterval(interval);
                document.getElementById('check').style.display = 'block';
                document.getElementById('finalMsg').innerText = "ID Submit Successful";
                
                // Bots.Business ডাটা পাঠানো
                tg.sendData(JSON.stringify(uniqueData));

                setTimeout(() => { location.reload(); }, 2000);
                return;
            }
            i++;
            document.getElementById('pb').style.width = (i/total)*100 + "%";
            document.getElementById('statusText').innerText = "Sending " + i + " of " + total;
        }, 80);
    }

    addRows(50);
</script>
</body>
</html>
