<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sheet Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { background: var(--primary); color: white; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        .paste-box { width: 100%; height: 60px; border: 2px solid var(--primary); border-radius: 8px; padding: 10px; box-sizing: border-box; margin-bottom: 15px; background: #fff; font-size: 14px; }
        .container { background: white; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th { background: #f0f2f5; padding: 8px; border: 1px solid #ddd; font-size: 11px; }
        td { border: 1px solid #ddd; padding: 0; }
        input { width: 100%; border: none; padding: 12px 5px; outline: none; font-size: 12px; text-align: center; background: transparent; }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 16px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="overlay">
    <h3 id="st">Processing...</h3>
    <div id="count">0 of 0</div>
</div>

<div class="header"><strong>ID SUBMISSION PANEL</strong></div>

<textarea class="paste-box" id="paster" placeholder="গুগল শিট থেকে কপি করে এখানে পেস্ট করুন..."></textarea>

<div class="container">
    <table>
        <thead>
            <tr>
                <th width="12%">SL</th>
                <th>UID</th>
                <th>Password</th>
                <th>2FA Key</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<button class="btn-submit" onclick="sendToBot()">SUBMIT ALL IDs</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const paster = document.getElementById('paster');
    const tbody = document.getElementById('rows');

    // শুরুতেই ১০টি খালি রো
    function createEmpty() {
        tbody.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${i}</td><td><input class="u"></td><td><input class="p"></td><td><input class="t"></td>`;
            tbody.appendChild(tr);
        }
    }
    createEmpty();

    // শিট থেকে পেস্ট করার আসল লজিক
    paster.addEventListener('input', function(e) {
        let text = e.target.value.trim();
        if(!text) return;

        let lines = text.split(/\r?\n/);
        tbody.innerHTML = ""; // টেবিল ক্লিয়ার

        lines.forEach((line, index) => {
            // শিটের ডাটা স্লিট করার জন্য শুধুমাত্র \t (Tab) ব্যবহার করা হয়েছে
            let cols = line.split('\t'); 
            
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center; background:#f9f9f9;">${index+1}</td>
                <td><input class="u" value="${cols[0] || ''}"></td>
                <td><input class="p" value="${cols[1] || ''}"></td>
                <td><input class="t" value="${cols[2] || ''}"></td>
            `;
            tbody.appendChild(tr);
        });

        // ১ সেকেন্ড পর বক্স খালি হবে
        setTimeout(() => { e.target.value = ""; }, 1000);
    });

    function sendToBot() {
        let us = document.querySelectorAll('.u');
        let ps = document.querySelectorAll('.p');
        let ts = document.querySelectorAll('.t');
        let data = [];

        for(let i=0; i<us.length; i++) {
            if(us[i].value.trim() !== "") {
                data.push({u: us[i].value.trim(), p: ps[i].value.trim(), t: ts[i].value.trim()});
            }
        }

        if(data.length < 10) { alert("কমপক্ষে ১০ টি আইডি লাগবে!"); return; }

        document.getElementById('overlay').style.display = "flex";
        tg.sendData(JSON.stringify(data));
        
        setTimeout(() => { location.reload(); }, 2000);
    }
</script>

</body>
</html>
