<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Submitter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #1877f2; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { background: var(--primary); color: white; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; }
        
        /* পেস্ট বক্স */
        .paste-box { width: 100%; height: 80px; border: 2px dashed var(--primary); border-radius: 8px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; outline: none; }
        
        .container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 320px; }
        th { background: #f0f2f5; padding: 8px; border: 1px solid #ddd; font-size: 12px; }
        td { border: 1px solid #ddd; padding: 0; }
        input { width: 100%; border: none; padding: 10px 5px; outline: none; font-size: 12px; text-align: center; background: transparent; box-sizing: border-box; }
        
        .footer { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-submit { background: var(--primary); color: white; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 80%; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.1s; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-weight:bold" id="statusMsg">Sending IDs...</div>
    <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
    <div id="countText">0 of 0</div>
</div>

<div class="header">
    <strong>ID SUBMISSION PANEL</strong><br>
    <small>Paste from Sheet below</small>
</div>

<textarea class="paste-box" id="paster" placeholder="এখানে শিট থেকে কপি করে পেস্ট করুন..."></textarea>

<div class="container">
    <table id="myTable">
        <thead>
            <tr>
                <th width="10%">SL</th>
                <th>UID</th>
                <th>Password</th>
                <th>2FA</th>
            </tr>
        </thead>
        <tbody id="tb"></tbody>
    </table>
</div>

<div class="footer">
    <button class="btn btn-submit" onclick="finalSubmit()">SUBMIT ALL ID</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // শুরুতে ১০টি খালি ঘর
    function initRows(n) {
        const tb = document.getElementById('tb');
        for(let i=1; i<=n; i++) {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${i}</td><td><input class="u"></td><td><input class="p"></td><td><input class="t"></td>`;
            tb.appendChild(tr);
        }
    }
    initRows(10);

    // পেস্ট বক্সের লজিক - ম্যাজিকের মতো ডাটা ভাগ হবে
    document.getElementById('paster').addEventListener('input', function(e) {
        let val = e.target.value.trim();
        if(!val) return;

        let rows = val.split(/\r?\n/);
        const tb = document.getElementById('tb');
        tb.innerHTML = ""; // আগের সব ক্লিয়ার

        rows.forEach((row, index) => {
            // ট্যাব বা একাধিক স্পেস দিয়ে স্লিট করা
            let cols = row.split(/\t+| {2,}/); 
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index+1}</td>
                <td><input class="u" value="${cols[0] || ''}"></td>
                <td><input class="p" value="${cols[1] || ''}"></td>
                <td><input class="t" value="${cols[2] || ''}"></td>
            `;
            tb.appendChild(tr);
        });
        
        // পেস্ট করার পর বক্সটা খালি করে দেওয়া (যাতে হিজিবিজি না লাগে)
        setTimeout(() => { e.target.value = ""; }, 1000);
    });

    function finalSubmit() {
        let us = document.querySelectorAll('.u');
        let ps = document.querySelectorAll('.p');
        let ts = document.querySelectorAll('.t');
        let data = [];

        for(let i=0; i<us.length; i++) {
            if(us[i].value.trim() !== "") {
                data.push({u: us[i].value.trim(), p: ps[i].value.trim(), t: ts[i].value.trim()});
            }
        }

        if(data.length < 10) { alert("Minimum 10 IDs! You have: " + data.length); return; }

        document.getElementById('overlay').style.display = "flex";
        let i = 0;
        let interval = setInterval(() => {
            if(i >= data.length) {
                clearInterval(interval);
                document.getElementById('statusMsg').innerText = "✔ ID Submit Successful";
                tg.sendData(JSON.stringify(data));
                setTimeout(() => { location.reload(); }, 2000);
                return;
            }
            i++;
            document.getElementById('pf').style.width = (i/data.length)*100 + "%";
            document.getElementById('countText').innerText = i + " of " + data.length;
        }, 100);
    }
</script>

</body>
</html>
